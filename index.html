<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bootstrap Shopping Cart</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container py-4">

  <h1 class="text-center mb-4">Shopping Cart</h1>

  <!-- Registration -->
  <div class="card p-3 mb-4">
    <h3>Register</h3>

    <div class="row g-2">
      <div class="col-md-5">
        <input type="text" class="form-control" placeholder="Username">
      </div>

      <div class="col-md-5">
        <input type="password" class="form-control" placeholder="Password">
      </div>

      <div class="col-md-2">
        <button class="btn btn-primary w-100">Register</button>
      </div>
    </div>
  </div>

  <!-- Login -->
  <div class="card p-3 mb-4">
    <h3>Login</h3>

    <div class="row g-2">
      <div class="col-md-5">
        <input type="text" class="form-control" placeholder="Username">
      </div>

      <div class="col-md-5">
        <input type="password" class="form-control" placeholder="Password">
      </div>

      <div class="col-md-2">
        <button class="btn btn-success w-100">Login</button>
      </div>
    </div>
  </div>

  <!-- Catalog -->
  <h2 class="mb-3">Catalog</h2>

  <div class="row">

    <div class="col-md-4 mb-3">
      <div class="card p-3 text-center">
        <h4>Laptop</h4>
        <p>₹50000</p>
        <button class="btn btn-dark" onclick="addToCart('Laptop')">
          Add to Cart
        </button>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card p-3 text-center">
        <h4>Mobile</h4>
        <p>₹20000</p>
        <button class="btn btn-dark" onclick="addToCart('Mobile')">
          Add to Cart
        </button>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card p-3 text-center">
        <h4>Headphones</h4>
        <p>₹3000</p>
        <button class="btn btn-dark" onclick="addToCart('Headphones')">
          Add to Cart
        </button>
      </div>
    </div>

  </div>

  <!-- Cart -->
  <div class="card p-3 mt-4">
    <h2>Cart</h2>
    <ul id="cart" class="list-group"></ul>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
